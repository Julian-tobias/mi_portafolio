<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Relojes | Julian Tobias</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a class="brand" href="../index.html">Julian Tobias</a>
            <nav class="nav-menu">
                <a href="../index.html#projects">Proyectos</a>
                <a href="../index.html#about">Sobre mí</a>
                <a href="../index.html#contact">Contacto</a>
            </nav>
        </div>
    </header>

    <main class="project-page">
        <div class="container">
            <h1>Sistema de Relojes</h1>
            <p class="project-summary">Demo interactiva de un reloj digital con alarma, diseñada para mostrar un proyecto real dentro de tu portafolio.</p>
            <div class="project-buttons">
                <a class="button primary" href="../index.html">Volver al portafolio</a>
                <a class="button secondary" href="https://github.com/Julian-tobias/mi_portafolio/tree/master/relojes" target="_blank" rel="noreferrer">Ver código</a>
            </div>

            <section class="section project-summary">
                <div class="clock-card">
                    <h2>Reloj digital</h2>
                    <p id="clock" class="large-text">00:00:00</p>
                    <div class="alarm-form">
                        <label for="alarmInput">Alarma (HH:MM, 24h):</label>
                        <input id="alarmInput" type="time">
                        <button id="setAlarm" class="button secondary small">Activar alarma</button>
                    </div>
                    <p id="alarmStatus">Sin alarma configurada.</p>
                </div>
            </section>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <p>Julian Tobias — Portafolio profesional</p>
        </div>
    </footer>

    <script src="../script.js"></script>
    <script>
        const clockElement = document.getElementById('clock');
        const alarmInput = document.getElementById('alarmInput');
        const setAlarmButton = document.getElementById('setAlarm');
        const alarmStatus = document.getElementById('alarmStatus');
        let alarmTime = null;

        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            clockElement.textContent = `${hours}:${minutes}:${seconds}`;

            if (alarmTime === `${hours}:${minutes}` && seconds === '00') {
                alarmStatus.textContent = '⏰ ¡Alarma activada!';
                clockElement.style.color = '#facc15';
            }
        }

        setInterval(updateClock, 1000);

        setAlarmButton.addEventListener('click', () => {
            if (alarmInput.value) {
                alarmTime = alarmInput.value;
                alarmStatus.textContent = `Alarma activada para las ${alarmTime}`;
            } else {
                alarmStatus.textContent = 'Ingresa una hora válida.';
            }
        });
    </script>
</body>
</html>
